name: Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  RELEASE_OWNER: zhaoyang8518
  RELEASE_REPO: tools-releases
  RELEASE_TAG: log-analysis-latest
  RELEASE_NAME: Production Log Diagnosis Latest

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove China-specific Cargo mirror config
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install

      - name: Build, sign, and upload Windows release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.TOOLS_RELEASES_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./src-tauri
          owner: ${{ env.RELEASE_OWNER }}
          repo: ${{ env.RELEASE_REPO }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_NAME }}
          releaseBody: |
            Latest OTA release for Production Log Diagnosis.

            Source tag: ${{ github.ref_name }}
          releaseCommitish: main
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove China-specific Cargo mirror config
        run: rm -f .cargo/config.toml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build, sign, and upload macOS release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.TOOLS_RELEASES_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./src-tauri
          owner: ${{ env.RELEASE_OWNER }}
          repo: ${{ env.RELEASE_REPO }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_NAME }}
          releaseBody: |
            Latest OTA release for Production Log Diagnosis.

            Source tag: ${{ github.ref_name }}
          releaseCommitish: main
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
